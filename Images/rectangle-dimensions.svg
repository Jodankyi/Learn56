<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Rectangle dimensions diagram">
  <rect x="0" y="0" width="360" height="220" fill="#f7fbff"/>
  <rect x="70" y="60" width="220" height="110" fill="#e8f2ff" stroke="#1d4f7a" stroke-width="3"/>
  <line x1="70" y1="45" x2="290" y2="45" stroke="#1d4f7a" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
  <line x1="305" y1="60" x2="305" y2="170" stroke="#1d4f7a" stroke-width="2" marker-start="url(#a)" marker-end="url(#a)"/>
  <text x="180" y="38" text-anchor="middle" font-family="Arial" font-size="16" fill="#123b5d">length</text>
  <text x="315" y="118" writing-mode="tb" font-family="Arial" font-size="16" fill="#123b5d">width</text>
  <text x="180" y="206" text-anchor="middle" font-family="Arial" font-size="15" fill="#123b5d">Area = length × width</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1d4f7a"/>
    </marker>
  </defs>
</svg>
