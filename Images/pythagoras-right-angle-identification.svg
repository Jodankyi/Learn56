<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" role="img" aria-labelledby="title desc">
  <title id="title">Right triangle with side legend labels</title>
  <desc id="desc">Triangle ABC has a right angle at B, and all angle labels are listed in a side panel for readability.</desc>
  <rect width="560" height="320" fill="#f8fbff"/>

  <text x="70" y="36" font-family="Arial, sans-serif" font-size="22" fill="#0f172a">Figure A: Identify the right angle and hypotenuse</text>

  <polygon points="90,250 90,90 330,250" fill="#e8f2ff" stroke="#1e3a8a" stroke-width="4"/>
  <line x1="90" y1="250" x2="130" y2="250" stroke="#1e3a8a" stroke-width="4"/>
  <line x1="90" y1="250" x2="90" y2="210" stroke="#1e3a8a" stroke-width="4"/>
  <rect x="90" y="230" width="20" height="20" fill="none" stroke="#0f766e" stroke-width="3"/>

  <text x="70" y="266" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">B</text>
  <text x="78" y="82" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">A</text>
  <text x="340" y="266" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">C</text>

  <rect x="360" y="70" width="178" height="190" rx="12" fill="#ffffff" stroke="#c8daee"/>
  <text x="372" y="98" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Labels</text>

  <circle cx="378" cy="120" r="5" fill="#0f766e"/>
  <text x="390" y="125" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">Angle B = 90 deg</text>

  <circle cx="378" cy="145" r="5" fill="#1d4ed8"/>
  <text x="390" y="150" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">Angle A = 35 deg</text>

  <circle cx="378" cy="170" r="5" fill="#3b82f6"/>
  <text x="390" y="175" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">Angle C = 55 deg</text>

  <circle cx="378" cy="195" r="5" fill="#1e3a8a"/>
  <text x="390" y="200" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">Hypotenuse = AC</text>

  <text x="372" y="230" font-family="Arial, sans-serif" font-size="12" fill="#475569">Use the square marker to</text>
  <text x="372" y="246" font-family="Arial, sans-serif" font-size="12" fill="#475569">identify the right angle.</text>
</svg>
