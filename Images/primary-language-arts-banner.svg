<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Primary Language Arts Banner</title>
  <desc id="desc">A playful banner for primary language arts with books, letters, speech bubbles, and writing tools.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="30" x2="1130" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4D6"/>
      <stop offset="0.5" stop-color="#E3F3FF"/>
      <stop offset="1" stop-color="#FEE4EF"/>
    </linearGradient>
    <linearGradient id="card" x1="280" y1="70" x2="920" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F4D92"/>
      <stop offset="1" stop-color="#1F7DE3"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F4D92" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1160" height="240" rx="28" fill="url(#bg)"/>
