<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" role="img" aria-labelledby="title desc">
  <title id="title">Pythagorean formula verification diagram with side labels</title>
  <desc id="desc">Right triangle with side labels moved to a side legend panel for readability.</desc>
  <rect width="560" height="320" fill="#f7fff8"/>

  <text x="60" y="48" font-family="Arial, sans-serif" font-size="24" fill="#052e16">Verify: 6^2 + 8^2 = 10^2</text>
  <text x="60" y="80" font-family="Arial, sans-serif" font-size="20" fill="#14532d">a^2 + b^2 = c^2</text>

  <polygon points="110,250 110,130 350,250" fill="#dcfce7" stroke="#166534" stroke-width="4"/>
  <rect x="110" y="230" width="20" height="20" fill="none" stroke="#166534" stroke-width="3"/>

  <text x="90" y="270" font-family="Arial, sans-serif" font-size="20" fill="#052e16">A</text>
  <text x="92" y="120" font-family="Arial, sans-serif" font-size="20" fill="#052e16">B</text>
  <text x="360" y="268" font-family="Arial, sans-serif" font-size="20" fill="#052e16">C</text>

  <rect x="374" y="88" width="160" height="168" rx="12" fill="#ffffff" stroke="#b9e1c7"/>
  <text x="386" y="114" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#14532d">Side Labels</text>

  <circle cx="392" cy="136" r="5" fill="#166534"/>
  <text x="404" y="141" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">AB = 6 units</text>

  <circle cx="392" cy="161" r="5" fill="#16a34a"/>
  <text x="404" y="166" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">AC = 8 units</text>

  <circle cx="392" cy="186" r="5" fill="#15803d"/>
  <text x="404" y="191" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">BC = 10 units</text>

  <text x="386" y="218" font-family="Arial, sans-serif" font-size="12" fill="#475569">Check that AB^2 + AC^2</text>
  <text x="386" y="234" font-family="Arial, sans-serif" font-size="12" fill="#475569">equals BC^2.</text>
</svg>
