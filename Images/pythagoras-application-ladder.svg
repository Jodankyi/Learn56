<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" viewBox="0 0 560 320" role="img" aria-labelledby="title desc">
  <title id="title">Ladder against wall right triangle with side legend</title>
  <desc id="desc">A ladder forms a right triangle with the wall and ground, and labels are shown beside the figure.</desc>
  <rect width="560" height="320" fill="#fffaf0"/>

  <text x="78" y="44" font-family="Arial, sans-serif" font-size="22" fill="#1f2937">Application Figure: Ladder, wall, and ground</text>

  <rect x="80" y="250" width="280" height="8" fill="#92400e"/>
  <rect x="340" y="90" width="10" height="168" fill="#78350f"/>
  <line x1="120" y1="250" x2="345" y2="98" stroke="#9a3412" stroke-width="7"/>
  <rect x="340" y="238" width="12" height="12" fill="none" stroke="#1f2937" stroke-width="2"/>

  <rect x="372" y="84" width="164" height="178" rx="12" fill="#ffffff" stroke="#e7c9a2"/>
  <text x="384" y="110" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7c2d12">Given Measurements</text>

  <circle cx="390" cy="132" r="5" fill="#92400e"/>
  <text x="402" y="137" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">Ground distance = 6 m</text>

  <circle cx="390" cy="157" r="5" fill="#78350f"/>
  <text x="402" y="162" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">Wall height = 8 m</text>

  <circle cx="390" cy="182" r="5" fill="#9a3412"/>
  <text x="402" y="187" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">Ladder = unknown</text>

  <text x="384" y="216" font-family="Arial, sans-serif" font-size="12" fill="#475569">Use c = sqrt(6^2 + 8^2)</text>
  <text x="384" y="232" font-family="Arial, sans-serif" font-size="12" fill="#475569">to find ladder length.</text>
</svg>
