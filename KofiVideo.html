<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kofi Story | Learn56</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .kofi-story-page {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(103, 232, 249, 0.35), transparent 34%),
                linear-gradient(150deg, #e8f9ff 0%, #c4edff 38%, #0ea5e9 100%);
            color: #0f2f52;
            padding:
                max(0.75rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
            box-sizing: border-box;
        }

        .kofi-story-shell {
            width: min(980px, 100%);
            margin: 0 auto;
            padding: 0.75rem 0 1.5rem;
        }

        .kofi-story-top {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 1rem;
        }

        .kofi-story-back {
            color: #0f4d92;
            font-weight: 800;
            text-decoration: none;
        }

        .kofi-hero {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 24px 60px rgba(15, 77, 146, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.72);
            padding: 1rem;
        }

        .kofi-hero-slide {
            position: relative;
            aspect-ratio: 16 / 8.8;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .kofi-hero-image {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .kofi-hero-overlay {
            position: absolute;
            inset: 0;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .kofi-slide-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            pointer-events: none;
        }

        .kofi-slide-btn {
            border: 0;
            background: rgba(255, 255, 255, 0.92);
            color: #0f4d92;
            width: 3rem;
            height: 3rem;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 900;
            box-shadow: 0 10px 22px rgba(15, 77, 146, 0.2);
            pointer-events: auto;
            touch-action: manipulation;
        }

        .kofi-slide-btn:hover {
            background: #ffffff;
        }

        .kofi-missing {
            text-align: center;
            margin: 0;
            padding: 1.2rem;
            color: #114b80;
            font-weight: 700;
        }

        @media (max-width: 720px) {
            .kofi-story-shell {
                padding-bottom: 1rem;
            }

            .kofi-story-top {
                margin-bottom: 0.7rem;
            }

            .kofi-story-back {
                font-size: 0.95rem;
            }

            .kofi-hero {
                padding: 0.55rem;
                border-radius: 20px;
                box-shadow: 0 16px 34px rgba(15, 77, 146, 0.16);
            }

            .kofi-hero-slide {
                aspect-ratio: 4 / 3;
                border-radius: 16px;
            }

            .kofi-hero-overlay {
                padding: 0.55rem;
            }

            .kofi-slide-btn {
                width: 2.85rem;
                height: 2.85rem;
            }
        }

        @media (max-width: 480px) {
            .kofi-story-page {
                padding:
                    max(0.5rem, env(safe-area-inset-top)) max(0.5rem, env(safe-area-inset-right)) max(0.85rem, env(safe-area-inset-bottom)) max(0.5rem, env(safe-area-inset-left));
            }

            .kofi-story-shell {
                padding-top: 0.35rem;
            }

            .kofi-story-top {
                margin-bottom: 0.5rem;
            }

            .kofi-hero {
                padding: 0.4rem;
                border-radius: 16px;
            }

            .kofi-hero-slide {
                aspect-ratio: 1 / 1;
                border-radius: 12px;
            }

            .kofi-hero-overlay {
                padding: 0.4rem;
            }

            .kofi-slide-btn {
                width: 2.6rem;
                height: 2.6rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body class="kofi-story-page">
    <main class="kofi-story-shell">
        <div class="kofi-story-top">
            <a href="Afrikomiks.html" class="kofi-story-back">Back to Afrikomiks</a>
        </div>

        <section class="kofi-hero" aria-label="Kofi story slides">
            <div class="kofi-hero-slide">
                <img src="Images/Kofi Tortoise/Slide1.jpeg" alt="Kofi story slide 1" class="kofi-hero-image"
                    id="kofi-hero-image">
                <p class="kofi-missing" id="kofi-missing" hidden>Kofi slides were not found in the Kofi folder.</p>
                <div class="kofi-hero-overlay">
                    <div class="kofi-slide-controls">
                        <button type="button" class="kofi-slide-btn" id="kofi-prev"
                            aria-label="Previous slide">&#10094;</button>
                        <button type="button" class="kofi-slide-btn" id="kofi-next"
                            aria-label="Next slide">&#10095;</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        (function () {
            var heroImage = document.getElementById('kofi-hero-image');
            var missing = document.getElementById('kofi-missing');
            var prevButton = document.getElementById('kofi-prev');
            var nextButton = document.getElementById('kofi-next');
            var heroSlide = document.querySelector('.kofi-hero-slide');
            var currentIndex = 0;
            var autoAdvanceId = null;
            var touchStartX = 0;
            var touchStartY = 0;
            var slides = [];

            if (!heroImage || !prevButton || !nextButton || !heroSlide || !missing) {
                return;
            }

            function loadSlide(src, altText) {
                return new Promise(function (resolve) {
                    var probe = new Image();
                    probe.onload = function () {
                        resolve({ ok: true, src: src, alt: altText });
                    };
                    probe.onerror = function () {
                        resolve({ ok: false });
                    };
                    probe.src = src;
                });
            }

            async function discoverSlides() {
                var basePaths = [
                    'Images/Kofi Tortoise',
                    'Images/Kofi-T',
                    'Images/Kofi',
                    'Kofi/Kofi Tortoise',
                    'Kofi'
                ];
                var extensions = ['png', 'jpeg', 'jpg', 'webp'];
                var found = [];
                var misses = 0;
                for (var i = 1; i <= 60; i += 1) {
                    var slideFound = false;
                    for (var pathIndex = 0; pathIndex < basePaths.length && !slideFound; pathIndex += 1) {
                        for (var extIndex = 0; extIndex < extensions.length && !slideFound; extIndex += 1) {
                            var src = basePaths[pathIndex] + '/Slide' + i + '.' + extensions[extIndex];
                            var result = await loadSlide(src, 'Kofi story slide ' + i);
                            if (result.ok) {
                                found.push({ src: result.src, alt: result.alt });
                                misses = 0;
                                slideFound = true;
                            }
                        }
                    }
                    if (!slideFound) {
                        misses += 1;
                    }
                    if (found.length && misses >= 3) {
                        break;
                    }
                }
                return found;
            }

            function renderSlide(index) {
                if (!slides.length) {
                    return;
                }
                currentIndex = (index + slides.length) % slides.length;
                var slide = slides[currentIndex];
                heroImage.src = slide.src;
                heroImage.alt = slide.alt;
            }

            function restartAutoAdvance() {
                if (autoAdvanceId) {
                    window.clearInterval(autoAdvanceId);
                }
                autoAdvanceId = window.setInterval(function () {
                    renderSlide(currentIndex + 1);
                }, 25000);
            }

            function showMissing() {
                heroImage.hidden = true;
                missing.hidden = false;
                prevButton.hidden = true;
                nextButton.hidden = true;
            }

            function bindControls() {
                prevButton.addEventListener('click', function () {
                    renderSlide(currentIndex - 1);
                    restartAutoAdvance();
                });

                nextButton.addEventListener('click', function () {
                    renderSlide(currentIndex + 1);
                    restartAutoAdvance();
                });

                heroSlide.addEventListener('touchstart', function (event) {
                    var touch = event.changedTouches && event.changedTouches[0];
                    if (!touch) {
                        return;
                    }
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                }, { passive: true });

                heroSlide.addEventListener('touchend', function (event) {
                    var touch = event.changedTouches && event.changedTouches[0];
                    if (!touch) {
                        return;
                    }
                    var deltaX = touch.clientX - touchStartX;
                    var deltaY = touch.clientY - touchStartY;
                    if (Math.abs(deltaX) < 40 || Math.abs(deltaX) < Math.abs(deltaY)) {
                        return;
                    }
                    if (deltaX < 0) {
                        renderSlide(currentIndex + 1);
                    } else {
                        renderSlide(currentIndex - 1);
                    }
                    restartAutoAdvance();
                }, { passive: true });
            }

            discoverSlides().then(function (foundSlides) {
                slides = foundSlides;
                if (!slides.length) {
                    showMissing();
                    return;
                }
                bindControls();
                renderSlide(0);
                restartAutoAdvance();
            });
        })();
    </script>
</body>

</html>
